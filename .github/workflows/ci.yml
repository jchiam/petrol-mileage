name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    name: Lint, test, build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build
        if: env.DATABASE_URL != ''
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high
