services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: 'postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-petrol_mileage}'
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-petrol_mileage}
      TZ: Asia/Singapore
      PGTZ: Asia/Singapore
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-petrol} -d ${POSTGRES_DB:-petrol_mileage}']
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-petrol_mileage}
      BACKUP_DIR: ${BACKUP_DIR:-/backups}
      TZ: Asia/Singapore
    volumes:
      - ${BACKUP_DIR:-./backups}:${BACKUP_DIR:-/backups}
      - ./scripts/backup.sh:/scripts/backup.sh:ro
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ['/bin/sh', '/scripts/backup.sh']

volumes:
  pgdata:
